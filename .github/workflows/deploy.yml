name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # github.repository は "owner/repo" 形式 → ghcr.io の image 名として使用
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io への push に必要

    steps:
      - uses: actions/checkout@v4

      # GitHub Container Registry にログイン
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker イメージをビルドして ghcr.io に push
      # ※ 初回 push 後は ghcr.io のパッケージを Public に変更すること（下記 README 参照）
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Azure にログイン（サービスプリンシパル JSON を AZURE_CREDENTIALS シークレットに設定）
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Container Apps のイメージを更新
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
